name: React package

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn test:react

  react-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react:
          - 16.14.0
          - 17.0.2
          - 18.3.1
          - 19.0.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn workspace iconsax-react build
      - run: node tests/react-version-smoke.js ${{ matrix.react }}
